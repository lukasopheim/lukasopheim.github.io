  <main>
    <h2>Contact</h2>

    <p>
      Use the form below to reach out.
    </p>
<!--  form for visitors to give me their info -->
    

      <label for="myName">Name:</label>
      <input type="text" id="myName" name="myName" required> 

      <label for="myEmail">Email:</label>
      <input type="email" id="myEmail" name="myEmail" required>

      <label for="myReason">Reason for contact:</label>
      <select id="myReason" name="myReason">
        <option value="networking">Networking</option>
        <option value="internship">Internship / Job</option>
        <option value="project">Project question</option>
        <option value="other">Other</option>
      </select>

      <label for="myMessage">Message:</label>
      <textarea id="myMessage" name="myMessage" rows="4" cols="30" required></textarea> 

      <input type="submit" value="Send">
    </form>
